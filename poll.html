<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PollWave — Vote</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0e0e11;--surface:#16161a;--card:#1c1c22;--card2:#222228;
      --border:#2a2a35;--border2:#3a3a48;--accent:#6c63ff;--accent-h:#5a52e8;
      --text:#f0f0f5;--muted:#8888a0;--dim:#55556a;--err:#ff6b6b;--success:#4ecb7a;--gold:#ffa94d;
    }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh; }
    body::before { content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0; }
    nav { position:sticky;top:0;z-index:100;background:rgba(14,14,17,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px; }
    .nav-logo { display:flex;align-items:center;gap:9px;text-decoration:none; }
    .nav-logo-icon { width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center; }
    .nav-logo-icon svg { width:16px;height:16px;fill:#fff; }
    .nav-logo-text { font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px; }
    .btn-sm { height:34px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);transition:background 0.15s;text-decoration:none;display:inline-flex;align-items:center; }
    .btn-sm:hover { background:var(--card2); }
    main { position:relative;z-index:1;max-width:640px;margin:0 auto;padding:40px 24px 80px; }
    .back-link { display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:24px;transition:color 0.15s; }
    .back-link:hover { color:var(--text); }
    .poll-card { background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px; }
    .poll-meta-top { display:flex;align-items:center;gap:10px;margin-bottom:16px; }
    .avatar { width:32px;height:32px;border-radius:50%;background:rgba(108,99,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0; }
    .poll-author { font-size:13px;color:var(--muted); }
    .poll-author span { color:var(--text);font-weight:500; }
    .badge { margin-left:auto;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px; }
    .badge-open { background:rgba(78,203,122,0.12);color:var(--success); }
    .badge-closed { background:rgba(136,136,160,0.12);color:var(--muted); }
    .poll-question { font-size:22px;font-weight:700;letter-spacing:-0.4px;line-height:1.3;margin-bottom:10px; }
    .poll-desc { font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:4px; }
    .poll-stats { font-size:12px;color:var(--dim);margin-top:14px;padding-top:14px;border-top:1px solid var(--border); }

    /* ── Options ── */
    .options-card { background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px; }
    .options-title { font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:16px; }
    .option { position:relative;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;overflow:hidden;user-select:none; }
    .option:last-child { margin-bottom:0; }
    .option-bar { position:absolute;inset:0;right:auto;width:0%;background:rgba(108,99,255,0.08);border-radius:12px;transition:width 0.5s ease;pointer-events:none; }
    .option:hover:not(.no-hover) { border-color:var(--accent);background:rgba(108,99,255,0.06); }
    .option.selected { border-color:var(--accent);background:rgba(108,99,255,0.08); }
    .option.winner { border-color:rgba(255,169,77,0.5);background:rgba(255,169,77,0.04); }
    .option.final-answer { border-color:var(--gold);background:rgba(255,169,77,0.08); }
    .option-inner { position:relative;z-index:1;display:flex;align-items:center;gap:12px; }
    .option-radio { width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.15s; }
    .option.selected .option-radio { border-color:var(--accent); }
    .option-radio-dot { width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity 0.15s; }
    .option.selected .option-radio-dot { opacity:1; }
    .option-label { flex:1;font-size:15px;font-weight:500;color:var(--text); }
    .option-pct { font-size:13px;font-weight:600;color:var(--muted);min-width:36px;text-align:right;display:none; }
    .option-count { font-size:12px;color:var(--dim);display:none; }
    .results-mode .option-pct { display:block; }
    .results-mode .option-count { display:block; }
    .results-mode .option-radio { display:none; }
    .results-mode .option { cursor:default; }

    /* final answer crown badge */
    .crown { font-size:14px;margin-left:6px; }
    .final-answer-badge { display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--gold);background:rgba(255,169,77,0.12);border:1px solid rgba(255,169,77,0.25);border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle; }

    /* ── Buttons ── */
    .vote-footer { margin-top:16px;display:flex;gap:10px;align-items:center; }
    .btn-vote { flex:1;height:46px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s,transform 0.1s; }
    .btn-vote:hover { background:var(--accent-h); }
    .btn-vote:active { transform:scale(0.98); }
    .btn-vote:disabled { opacity:0.45;cursor:not-allowed;transform:none; }
    .spinner { width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:none; }
    .btn-vote.loading .spinner { display:block; }
    .btn-vote.loading .lbl { display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Owner close poll section */
    .owner-section { margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 24px; }
    .owner-section h3 { font-size:14px;font-weight:600;margin-bottom:4px; }
    .owner-section p { font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5; }
    .owner-options { display:flex;flex-direction:column;gap:8px;margin-bottom:14px; }
    .owner-opt { display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s; }
    .owner-opt:hover { border-color:var(--gold);background:rgba(255,169,77,0.06); }
    .owner-opt.selected { border-color:var(--gold);background:rgba(255,169,77,0.10); }
    .owner-opt-radio { width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.15s; }
    .owner-opt.selected .owner-opt-radio { border-color:var(--gold); }
    .owner-opt-dot { width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity 0.15s; }
    .owner-opt.selected .owner-opt-dot { opacity:1; }
    .owner-opt-label { font-size:14px;font-weight:500; }
    .btn-close-poll { width:100%;height:42px;border-radius:10px;background:rgba(255,169,77,0.15);border:1px solid rgba(255,169,77,0.35);color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s; }
    .btn-close-poll:hover { background:rgba(255,169,77,0.22); }
    .btn-close-poll:disabled { opacity:0.45;cursor:not-allowed; }

    .voted-msg { display:none;align-items:center;gap:8px;font-size:13px;color:var(--success);background:rgba(78,203,122,0.10);border:1px solid rgba(78,203,122,0.25);border-radius:10px;padding:10px 14px;width:100%; }
    .voted-msg.show { display:flex; }
    .banner { padding:11px 14px;border-radius:10px;font-size:13px;margin-top:14px;display:none; }
    .banner.error { display:block;background:rgba(255,107,107,0.10);border:1px solid rgba(255,107,107,0.25);color:var(--err); }
    .skel { background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px; }
    .skel-box { background:var(--border);border-radius:8px;animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    @media(max-width:600px){nav{padding:0 16px}main{padding:24px 16px 60px}}
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="dashboard.html">
      <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M3 17h4v-6H3v6zm0-8h4V7H3v2zm6 8h4v-4H9v4zm0-8h4V7H9v2zm6 8h4V9h-4v8zm0-10h4V7h-4v2z"/></svg></div>
      <span class="nav-logo-text">PollWave</span>
    </a>
    <a class="btn-sm" href="dashboard.html">← Dashboard</a>
  </nav>

  <main>
    <a class="back-link" href="dashboard.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to dashboard
    </a>

    <div id="skeletons">
      <div class="skel"><div style="display:flex;gap:10px;align-items:center;margin-bottom:18px"><div class="skel-box" style="width:32px;height:32px;border-radius:50%"></div><div class="skel-box" style="height:13px;width:120px"></div></div><div class="skel-box" style="height:26px;width:80%;margin-bottom:10px"></div><div class="skel-box" style="height:14px;width:55%"></div></div>
      <div class="skel"><div class="skel-box" style="height:13px;width:80px;margin-bottom:16px"></div><div class="skel-box" style="height:52px;border-radius:12px;margin-bottom:10px"></div><div class="skel-box" style="height:52px;border-radius:12px;margin-bottom:10px"></div><div class="skel-box" style="height:52px;border-radius:12px"></div></div>
    </div>

    <div id="content" style="display:none">
      <div class="poll-card">
        <div class="poll-meta-top">
          <div class="avatar" id="p-avatar">?</div>
          <div class="poll-author">by <span id="p-author">—</span></div>
          <span class="badge" id="p-badge">—</span>
        </div>
        <div class="poll-question" id="p-question">—</div>
        <div class="poll-desc"     id="p-desc"></div>
        <div class="poll-stats"    id="p-stats"></div>
      </div>

      <div class="options-card" id="options-card">
        <div class="options-title" id="options-title">Cast your vote</div>
        <div id="options-list"></div>
        <div class="vote-footer" id="vote-footer">
          <button class="btn-vote" id="btn-vote" onclick="submitVote()" disabled>
            <div class="spinner"></div><span class="lbl">Vote</span>
          </button>
        </div>
        <div class="voted-msg" id="voted-msg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          You've already voted on this poll.
        </div>
        <div class="banner" id="err-banner"></div>
      </div>

      <!-- Owner panel: pick final answer & close poll -->
      <div class="owner-section" id="owner-section" style="display:none">
        <h3>🏁 Close poll &amp; pick a final answer</h3>
        <p>Select the answer you want to mark as the final result, then close the poll. This cannot be undone.</p>
        <div class="owner-options" id="owner-options"></div>
        <button class="btn-close-poll" id="btn-close" onclick="closePoll()" disabled>
          <div class="spinner" id="close-spinner"></div>
          <span id="close-lbl">Close poll with this answer</span>
        </button>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL  = 'https://empvogfvzuutfizzsocx.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtcHZvZ2Z2enV1dGZpenpzb2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzEwMzcsImV4cCI6MjA5ODEwNzAzN30.BP3aWRPxURQqYYmvWrtzTNXElUvxkcPmG5BlMgmgAno';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const session = sessionStorage.getItem('pw_user');
    if (!session) { window.location.href = 'login.html'; }
    const user = JSON.parse(session);

    const pollId = new URLSearchParams(window.location.search).get('id');
    if (!pollId) { window.location.href = 'dashboard.html'; }

    let poll       = null;
    let options    = [];
    let votes      = [];
    let selectedId = null;
    let hasVoted   = false;
    let isOwner    = false;
    let isClosed   = false;
    let finalAnswerId = null;
    let ownerSelectedId = null;

    async function loadPoll() {
      try {
        // Load poll
        const { data: p, error: pErr } = await sb
          .from('polls')
          .select('id,question,description,is_public,created_at,ends_at,user_id,final_answer_id,poll_options(id,label,position),votes(id,option_id,user_id)')
          .eq('id', pollId)
          .single();
        if (pErr) throw pErr;

        // Load owner username separately
        const { data: uData } = await sb.from('users').select('username').eq('id', p.user_id).single();

        poll     = { ...p, username: uData?.username || '?' };
        options  = (p.poll_options || []).sort((a,b) => a.position - b.position);
        votes    = p.votes || [];
        hasVoted = votes.some(v => v.user_id === user.id);
        isOwner  = p.user_id === user.id;
        isClosed = p.ends_at && new Date(p.ends_at) < new Date();
        finalAnswerId = p.final_answer_id || null;

        renderPoll();
      } catch(e) {
        document.getElementById('skeletons').innerHTML =
          `<div style="text-align:center;padding:60px 20px;color:var(--muted)"><p style="font-size:15px;color:var(--err)">Failed to load poll.</p><p style="font-size:13px;margin-top:6px">${e.message}</p></div>`;
      }
    }

    function renderPoll() {
      document.getElementById('skeletons').style.display = 'none';
      document.getElementById('content').style.display   = 'block';

      const totalVotes = votes.length;
      const created    = new Date(poll.created_at).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});

      document.getElementById('p-avatar').textContent   = poll.username[0].toUpperCase();
      document.getElementById('p-author').textContent   = poll.username;
      document.getElementById('p-question').textContent = poll.question;
      document.getElementById('p-stats').textContent    = `${totalVotes} vote${totalVotes!==1?'s':''} · Created ${created}`;
      if (poll.description) document.getElementById('p-desc').textContent = poll.description;

      const badge = document.getElementById('p-badge');
      badge.textContent = isClosed ? 'Closed' : 'Open';
      badge.className   = `badge ${isClosed ? 'badge-closed' : 'badge-open'}`;

      const resultsMode = hasVoted || isClosed;
      if (resultsMode) {
        document.getElementById('options-title').textContent = 'Results';
        document.getElementById('options-card').classList.add('results-mode');
        document.getElementById('vote-footer').style.display = 'none';
        if (hasVoted) document.getElementById('voted-msg').classList.add('show');
      }

      renderOptions(resultsMode);

      // Show owner panel only if poll is still open and user is owner
      if (isOwner && !isClosed) {
        document.getElementById('owner-section').style.display = 'block';
        renderOwnerOptions();
      }
    }

    function renderOptions(resultsMode) {
      const totalVotes = votes.length;
      const voteCounts = {};
      options.forEach(o => voteCounts[o.id] = 0);
      votes.forEach(v => { if (voteCounts[v.option_id]!==undefined) voteCounts[v.option_id]++; });
      const maxVotes = Math.max(...Object.values(voteCounts), 0);
      const myVote   = votes.find(v => v.user_id === user.id);

      document.getElementById('options-list').innerHTML = options.map(opt => {
        const count   = voteCounts[opt.id] || 0;
        const pct     = totalVotes > 0 ? Math.round((count/totalVotes)*100) : 0;
        const isFinal = finalAnswerId === opt.id;
        const isMyVote= myVote?.option_id === opt.id;
        const isWinner= resultsMode && count===maxVotes && count>0 && !finalAnswerId;

        return `<div class="option${isMyVote?' selected':''}${isFinal?' final-answer':isWinner?' winner':''} ${resultsMode?'no-hover':''}"
             id="opt-${opt.id}" onclick="selectOption('${opt.id}')">
          <div class="option-bar" style="width:${resultsMode?pct:0}%"></div>
          <div class="option-inner">
            <div class="option-radio"><div class="option-radio-dot"></div></div>
            <span class="option-label">
              ${escHtml(opt.label)}
              ${isFinal?`<span class="final-answer-badge">👑 Final answer</span>`:''}
              ${isMyVote?`<span style="font-size:11px;color:var(--accent);font-weight:600;margin-left:6px">✓ Your vote</span>`:''}
            </span>
            <span class="option-count">${count} vote${count!==1?'s':''}</span>
            <span class="option-pct">${pct}%</span>
          </div>
        </div>`;
      }).join('');
    }

    function selectOption(id) {
      if (document.getElementById('options-card').classList.contains('results-mode')) return;
      selectedId = id;
      document.querySelectorAll('#options-list .option').forEach(el =>
        el.classList.toggle('selected', el.id==='opt-'+id)
      );
      document.getElementById('btn-vote').disabled = false;
    }

    // ── Owner: pick final answer ───────────────────────────────
    function renderOwnerOptions() {
      document.getElementById('owner-options').innerHTML = options.map(opt => `
        <div class="owner-opt" id="oopt-${opt.id}" onclick="selectOwnerOption('${opt.id}')">
          <div class="owner-opt-radio"><div class="owner-opt-dot"></div></div>
          <span class="owner-opt-label">${escHtml(opt.label)}</span>
        </div>`).join('');
    }

    function selectOwnerOption(id) {
      ownerSelectedId = id;
      document.querySelectorAll('.owner-opt').forEach(el =>
        el.classList.toggle('selected', el.id==='oopt-'+id)
      );
      document.getElementById('btn-close').disabled = false;
    }

    async function closePoll() {
      if (!ownerSelectedId) return;
      if (!confirm('Close this poll and set the final answer? This cannot be undone.')) return;

      const btn     = document.getElementById('btn-close');
      const spinner = document.getElementById('close-spinner');
      const lbl     = document.getElementById('close-lbl');
      btn.disabled  = true;
      spinner.style.display = 'block';
      lbl.style.display     = 'none';

      try {
        // Set ends_at to now and save final_answer_id
        const { error } = await sb
          .from('polls')
          .update({ ends_at: new Date().toISOString(), final_answer_id: ownerSelectedId })
          .eq('id', pollId)
          .eq('user_id', user.id);
        if (error) throw error;
        await loadPoll();
      } catch(e) {
        const b = document.getElementById('err-banner');
        b.textContent = e.message;
        b.className = 'banner error';
        btn.disabled  = false;
        spinner.style.display = 'none';
        lbl.style.display     = '';
      }
    }

    // ── Vote ───────────────────────────────────────────────────
    async function submitVote() {
      if (!selectedId) return;
      const btn = document.getElementById('btn-vote');
      btn.disabled = true; btn.classList.add('loading');
      document.getElementById('err-banner').className = 'banner';
      try {
        const { error } = await sb.rpc('cast_vote',{p_user_id:user.id,p_poll_id:pollId,p_option_id:selectedId});
        if (error) {
          if (error.message.includes('unique')) throw new Error('You have already voted on this poll.');
          throw error;
        }
        await loadPoll();
      } catch(e) {
        const b = document.getElementById('err-banner');
        b.textContent = e.message; b.className = 'banner error';
        btn.disabled = false; btn.classList.remove('loading');
      }
    }

    function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    loadPoll();
  </script>
</body>
</html>
