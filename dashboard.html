<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PollWave — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0e0e11;--surface:#16161a;--card:#1c1c22;--card2:#222228;
      --border:#2a2a35;--border2:#3a3a48;--accent:#6c63ff;--accent-h:#5a52e8;
      --text:#f0f0f5;--muted:#8888a0;--dim:#55556a;--err:#ff6b6b;--success:#4ecb7a;--gold:#ffa94d;
    }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh; }
    body::before { content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0; }

    nav { position:sticky;top:0;z-index:100;background:rgba(14,14,17,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px; }
    .nav-logo { display:flex;align-items:center;gap:9px;text-decoration:none; }
    .nav-logo-icon { width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center; }
    .nav-logo-icon svg { width:16px;height:16px;fill:#fff; }
    .nav-logo-text { font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px; }
    .nav-right { display:flex;align-items:center;gap:12px; }
    .nav-user { font-size:13px;color:var(--muted); }
    .nav-user span { color:var(--text);font-weight:500; }
    .nav-points { display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;border-radius:20px;padding:4px 12px;transition:all 0.2s; }
    .btn-sm { height:34px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);transition:background 0.15s; }
    .btn-sm:hover { background:var(--card2); }
    .btn-accent { background:var(--accent);border-color:var(--accent);color:#fff; }
    .btn-accent:hover { background:var(--accent-h);border-color:var(--accent-h); }

    main { position:relative;z-index:1;max-width:900px;margin:0 auto;padding:36px 24px 60px; }
    .page-header { display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap; }
    .page-header h1 { font-size:24px;font-weight:700;letter-spacing:-0.4px; }
    .page-header p { font-size:14px;color:var(--muted);margin-top:3px; }

    .stats { display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px; }
    .stat-card { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:border-color 0.2s; }
    .stat-label { font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px; }
    .stat-value { font-size:28px;font-weight:700;letter-spacing:-0.5px;transition:color 0.2s; }

    .leaderboard { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:28px; }
    .leaderboard-title { font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:14px; }
    .lb-row { display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border); }
    .lb-row:last-child { border-bottom:none; }
    .lb-rank { font-size:13px;font-weight:700;width:28px;text-align:center;color:var(--dim);flex-shrink:0; }
    .lb-avatar { width:28px;height:28px;border-radius:50%;background:rgba(108,99,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0; }
    .lb-name { flex:1;font-size:14px;font-weight:500; }
    .lb-name.is-me { color:var(--accent); }
    .lb-pts { font-size:13px;font-weight:700; }
    .lb-empty { font-size:13px;color:var(--dim);text-align:center;padding:12px 0; }

    .tabs { display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto; }
    .tab { padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color 0.15s;white-space:nowrap; }
    .tab.active { color:var(--text);border-bottom-color:var(--accent); }

    .poll-list { display:flex;flex-direction:column;gap:12px; }
    .poll-card { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color 0.15s,background 0.15s; }
    .poll-card:hover { border-color:var(--border2);background:var(--card2); }
    .poll-icon { width:42px;height:42px;background:rgba(108,99,255,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .poll-icon svg { width:20px;height:20px;fill:var(--accent); }
    .poll-body { flex:1;min-width:0; }
    .poll-question { font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px; }
    .poll-meta { font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap; }
    .poll-right { display:flex;align-items:center;gap:8px;flex-shrink:0; }
    .badge { padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px; }
    .badge-open     { background:rgba(78,203,122,0.12);color:var(--success); }
    .badge-closed   { background:rgba(136,136,160,0.12);color:var(--muted); }
    .badge-mine     { background:rgba(108,99,255,0.12);color:var(--accent); }
    .badge-correct  { background:rgba(78,203,122,0.15);color:var(--success);border:1px solid rgba(78,203,122,0.3); }
    .badge-incorrect{ background:rgba(255,107,107,0.15);color:var(--err);border:1px solid rgba(255,107,107,0.3); }
    .btn-delete { width:30px;height:30px;border-radius:7px;background:none;border:1px solid transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s; }
    .btn-delete:hover { background:rgba(255,107,107,0.10);border-color:rgba(255,107,107,0.25);color:var(--err); }

    .empty { text-align:center;padding:60px 20px;color:var(--muted); }
    .empty svg { width:48px;height:48px;opacity:0.2;margin-bottom:14px; }
    .empty h3 { font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px; }
    .empty p { font-size:14px; }

    .skeleton { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;gap:16px;align-items:center; }
    .skel-box { background:var(--border);border-radius:8px;animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    .modal-backdrop { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:24px; }
    .modal-backdrop.open { display:flex; }
    .modal { background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto; }
    .modal h2 { font-size:18px;font-weight:700;margin-bottom:20px; }
    .form-group { margin-bottom:16px; }
    label { display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:7px; }
    input[type="text"],textarea { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 13px;outline:none;font-family:inherit;transition:border-color 0.15s;resize:vertical; }
    input[type="text"] { height:42px;resize:none; }
    input:focus,textarea:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15); }
    input::placeholder,textarea::placeholder { color:var(--dim); }
    .options-list { display:flex;flex-direction:column;gap:8px; }
    .option-row { display:flex;gap:8px;align-items:center; }
    .option-row input { flex:1; }
    .btn-remove-opt { width:32px;height:32px;border-radius:8px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s; }
    .btn-remove-opt:hover { border-color:var(--err);color:var(--err); }
    .btn-add-opt { margin-top:8px;height:36px;padding:0 14px;border-radius:8px;background:none;border:1px dashed var(--border2);color:var(--muted);font-size:13px;cursor:pointer;width:100%;transition:all 0.15s; }
    .btn-add-opt:hover { border-color:var(--accent);color:var(--accent); }
    .modal-footer { display:flex;gap:10px;margin-top:22px; }
    .btn-full { flex:1;height:44px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:background 0.15s; }
    .btn-full:hover { background:var(--card2); }
    .btn-full.primary { background:var(--accent);border-color:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px; }
    .btn-full.primary:hover { background:var(--accent-h); }
    .btn-full.primary:disabled { opacity:0.55;cursor:not-allowed; }
    .spinner { width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:none; }
    .btn-full.primary.loading .spinner { display:block; }
    .btn-full.primary.loading .lbl { display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .banner { padding:10px 13px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none; }
    .banner.error   { display:block;background:rgba(255,107,107,0.10);border:1px solid rgba(255,107,107,0.25);color:var(--err); }
    .banner.success { display:block;background:rgba(78,203,122,0.10);border:1px solid rgba(78,203,122,0.25);color:var(--success); }
    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);z-index:999;transition:transform 0.25s ease;white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); }

    @media(max-width:700px) { nav{padding:0 16px} main{padding:24px 16px 60px} .nav-user{display:none} }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="dashboard.html">
      <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M3 17h4v-6H3v6zm0-8h4V7H3v2zm6 8h4v-4H9v4zm0-8h4V7H9v2zm6 8h4V9h-4v8zm0-10h4V7h-4v2z"/></svg></div>
      <span class="nav-logo-text">PollWave</span>
    </a>
    <div class="nav-right">
      <span class="nav-user">Signed in as <span id="nav-username">—</span></span>
      <div class="nav-points" id="nav-points-badge">⭐ <span id="nav-points">0</span> pts</div>
      <button class="btn-sm btn-accent" onclick="openModal()">+ New poll</button>
      <button class="btn-sm" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <main>
    <div class="page-header"><div><h1>Dashboard</h1><p>Create polls, collect points, see results.</p></div></div>

    <div class="stats">
      <div class="stat-card" id="stat-points-card">
        <div class="stat-label">Your points</div>
        <div class="stat-value" id="stat-points">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Not voted</div>
        <div class="stat-value" id="stat-unvoted">—</div>
      </div>
    </div>

    <div class="leaderboard">
      <div class="leaderboard-title">🏆 Leaderboard</div>
      <div id="lb-list"><div class="lb-empty">Loading…</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('all')"     id="tab-all">All polls</button>
      <button class="tab"        onclick="switchTab('mine')"    id="tab-mine">My polls</button>
      <button class="tab"        onclick="switchTab('unvoted')" id="tab-unvoted">Not voted</button>
      <button class="tab"        onclick="switchTab('closed')"  id="tab-closed">Closed</button>
    </div>

    <div class="banner" id="page-banner"></div>

    <div class="poll-list" id="poll-list">
      <div class="skeleton" id="skel1"><div class="skel-box" style="width:42px;height:42px;border-radius:10px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="skel-box" style="height:14px;width:60%"></div><div class="skel-box" style="height:12px;width:35%"></div></div></div>
      <div class="skeleton" id="skel2"><div class="skel-box" style="width:42px;height:42px;border-radius:10px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="skel-box" style="height:14px;width:75%"></div><div class="skel-box" style="height:12px;width:40%"></div></div></div>
      <div class="skeleton" id="skel3"><div class="skel-box" style="width:42px;height:42px;border-radius:10px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div class="skel-box" style="height:14px;width:50%"></div><div class="skel-box" style="height:12px;width:30%"></div></div></div>
    </div>
  </main>

  <div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
    <div class="modal">
      <h2>Create a poll</h2>
      <div class="banner" id="modal-banner"></div>
      <div class="form-group"><label for="m-question">Question</label><input type="text" id="m-question" placeholder="What do you want to ask?" maxlength="200" /></div>
      <div class="form-group"><label for="m-desc">Description <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="m-desc" rows="2" placeholder="Add more context…"></textarea></div>
      <div class="form-group">
        <label>Options <span style="font-weight:400;text-transform:none;letter-spacing:0">(min. 2)</span></label>
        <div class="options-list" id="options-list">
          <div class="option-row"><input type="text" placeholder="Option 1" /><button class="btn-remove-opt" onclick="removeOption(this)">✕</button></div>
          <div class="option-row"><input type="text" placeholder="Option 2" /><button class="btn-remove-opt" onclick="removeOption(this)">✕</button></div>
        </div>
        <button class="btn-add-opt" onclick="addOption()">+ Add option</button>
      </div>
      <div class="modal-footer">
        <button class="btn-full" onclick="closeModal()">Cancel</button>
        <button class="btn-full primary" id="btn-create" onclick="createPoll()"><div class="spinner"></div><span class="lbl">Create poll</span></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL  = 'https://empvogfvzuutfizzsocx.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtcHZvZ2Z2enV1dGZpenpzb2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzEwMzcsImV4cCI6MjA5ODEwNzAzN30.BP3aWRPxURQqYYmvWrtzTNXElUvxkcPmG5BlMgmgAno';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const session = sessionStorage.getItem('pw_user');
    if (!session) { window.location.href = 'login.html'; }
    const user = JSON.parse(session);
    document.getElementById('nav-username').textContent = user.username;

    let currentTab = 'all';
    let allPolls   = [];

    // ── Helpers ────────────────────────────────────────────────
    function ptsColor(n)  { return n > 0 ? 'var(--gold)' : n < 0 ? 'var(--err)' : 'var(--muted)'; }
    function ptsIcon(n)   { return n < 0 ? '📉' : '⭐'; }
    function ptsLabel(n)  { return (n > 0 ? '+' : '') + n + ' pts'; }

    // ── Load everything ────────────────────────────────────────
    async function loadAll() {
      await Promise.all([loadPolls(), loadLeaderboard()]);
    }

    async function loadLeaderboard() {
      try {
        const { data, error } = await sb
          .from('users')
          .select('id,username,points')
          .order('points', { ascending: false })
          .limit(10);
        if (error) throw error;

        const me    = (data || []).find(u => u.id === user.id);
        const myPts = me?.points ?? 0;

        // Update nav badge
        const badge = document.getElementById('nav-points-badge');
        badge.innerHTML = `${ptsIcon(myPts)} <span id="nav-points">${myPts}</span> pts`;
        badge.style.color       = ptsColor(myPts);
        badge.style.background  = myPts < 0 ? 'rgba(255,107,107,0.08)' : 'rgba(255,169,77,0.10)';
        badge.style.border      = `1px solid ${myPts < 0 ? 'rgba(255,107,107,0.25)' : 'rgba(255,169,77,0.2)'}`;

        // Update stat card
        const statEl   = document.getElementById('stat-points');
        const statCard = document.getElementById('stat-points-card');
        statEl.textContent   = myPts;
        statEl.style.color   = ptsColor(myPts);
        statCard.style.borderColor = myPts < 0 ? 'rgba(255,107,107,0.25)' : myPts > 0 ? 'rgba(255,169,77,0.25)' : 'var(--border)';
        statCard.style.background  = myPts < 0 ? 'rgba(255,107,107,0.05)' : myPts > 0 ? 'rgba(255,169,77,0.05)' : 'var(--card)';

        const list = document.getElementById('lb-list');
        if (!data || !data.length) {
          list.innerHTML = '<div class="lb-empty">No points yet — close a poll to start scoring!</div>';
          return;
        }

        const medals = ['🥇','🥈','🥉'];
        list.innerHTML = data.map((u, i) => {
          const isMe   = u.id === user.id;
          const color  = ptsColor(u.points);
          const icon   = ptsIcon(u.points);
          const rankDisplay = medals[i] || (i + 1);
          return `<div class="lb-row">
            <div class="lb-rank">${rankDisplay}</div>
            <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
            <div class="lb-name ${isMe ? 'is-me' : ''}">${escHtml(u.username)}${isMe ? ' (you)' : ''}</div>
            <div class="lb-pts" style="color:${color}">${icon} ${u.points}</div>
          </div>`;
        }).join('');
      } catch(e) {
        document.getElementById('lb-list').innerHTML = '<div class="lb-empty">Failed to load leaderboard.</div>';
      }
    }

    async function loadPolls() {
      try {
        const { data: polls, error: pollErr } = await sb
          .from('polls')
          .select('id,question,description,is_public,created_at,ends_at,user_id,final_answer_id')
          .order('created_at', { ascending: false });
        if (pollErr) throw pollErr;

        if (!polls.length) { allPolls = []; updateStats(); renderPolls(); return; }

        const pollIds = polls.map(p => p.id);
        const userIds = [...new Set(polls.map(p => p.user_id))];

        const [usersRes, optionsRes, votesRes, myVotesRes] = await Promise.all([
          sb.from('users').select('id,username').in('id', userIds),
          sb.from('poll_options').select('id,poll_id').in('poll_id', pollIds),
          sb.from('votes').select('id,poll_id').in('poll_id', pollIds),
          sb.from('votes').select('poll_id,option_id').eq('user_id', user.id).in('poll_id', pollIds),
        ]);

        if (usersRes.error)   throw usersRes.error;
        if (optionsRes.error) throw optionsRes.error;
        if (votesRes.error)   throw votesRes.error;

        const userMap = {};
        (usersRes.data || []).forEach(u => userMap[u.id] = u.username);

        const optionCount = {};
        (optionsRes.data || []).forEach(o => { optionCount[o.poll_id] = (optionCount[o.poll_id] || 0) + 1; });

        const voteCount = {};
        (votesRes.data || []).forEach(v => { voteCount[v.poll_id] = (voteCount[v.poll_id] || 0) + 1; });

        const myVoteMap = {};
        (myVotesRes.data || []).forEach(v => { myVoteMap[v.poll_id] = v.option_id; });

        allPolls = polls.map(p => ({
          ...p,
          username:      userMap[p.user_id] || '?',
          optionCount:   optionCount[p.id]  || 0,
          voteCount:     voteCount[p.id]    || 0,
          myVotedOption: myVoteMap[p.id]    || null,
        }));

        updateStats();
        renderPolls();
      } catch(e) {
        showPageBanner('Failed to load polls: ' + e.message);
      }
    }

    function isClosed(p) { return !!(p.ends_at && new Date(p.ends_at) < new Date()); }
    function hasVoted(p) { return !!p.myVotedOption; }

    function updateStats() {
      const unvoted = allPolls.filter(p => !isClosed(p) && !hasVoted(p) && p.user_id !== user.id);
      document.getElementById('stat-unvoted').textContent = unvoted.length;
    }

    function renderPolls() {
      const list = document.getElementById('poll-list');
      ['skel1','skel2','skel3'].forEach(id => { const el = document.getElementById(id); if (el) el.remove(); });

      let polls;
      if      (currentTab === 'mine')    polls = allPolls.filter(p => p.user_id === user.id);
      else if (currentTab === 'closed')  polls = allPolls.filter(p => isClosed(p));
      else if (currentTab === 'unvoted') polls = allPolls.filter(p => !isClosed(p) && !hasVoted(p) && p.user_id !== user.id);
      else                               polls = allPolls;

      if (!polls.length) {
        const msgs = {
          all:     ['No polls found',  'Be the first to create a poll!'],
          mine:    ['No polls yet',    'Create your first poll using the button above.'],
          closed:  ['No closed polls', 'Polls that have been closed will appear here.'],
          unvoted: ['All caught up!',  'You have voted on all available polls.'],
        };
        const [title, sub] = msgs[currentTab];
        list.innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M8 8h5M8 16h3"/></svg>
          <h3>${title}</h3><p>${sub}</p></div>`;
        return;
      }

      list.innerHTML = polls.map(p => {
        const isOwner = p.user_id === user.id;
        const closed  = isClosed(p);
        const voted   = hasVoted(p);
        const created = new Date(p.created_at).toLocaleDateString('en-MY', { day:'numeric', month:'short', year:'numeric' });

        let correctBadge = '';
        if (closed && p.final_answer_id && voted) {
          const correct = p.myVotedOption === p.final_answer_id;
          correctBadge = correct
            ? `<span class="badge badge-correct">✓ Correct</span>`
            : `<span class="badge badge-incorrect">✗ Wrong</span>`;
        }

        return `<div class="poll-card" onclick="gotoPoll('${p.id}')">
          <div class="poll-icon"><svg viewBox="0 0 24 24"><path d="M3 17h4v-6H3v6zm0-8h4V7H3v2zm6 8h4v-4H9v4zm0-8h4V7H9v2zm6 8h4V9h-4v8zm0-10h4V7h-4v2z"/></svg></div>
          <div class="poll-body">
            <div class="poll-question">${escHtml(p.question)}</div>
            <div class="poll-meta">
              <span>by ${escHtml(p.username)}</span>
              <span>${p.optionCount} option${p.optionCount !== 1 ? 's' : ''}</span>
              <span>${p.voteCount} vote${p.voteCount !== 1 ? 's' : ''}</span>
              <span>${created}</span>
            </div>
          </div>
          <div class="poll-right">
            ${isOwner ? `<span class="badge badge-mine">Mine</span>` : ''}
            ${correctBadge}
            <span class="badge ${closed ? 'badge-closed' : 'badge-open'}">${closed ? 'Closed' : 'Open'}</span>
            ${isOwner ? `<button class="btn-delete" onclick="deletePoll(event,'${p.id}')" title="Delete poll">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function switchTab(tab) {
      currentTab = tab;
      ['all','mine','unvoted','closed'].forEach(t =>
        document.getElementById('tab-' + t).classList.toggle('active', t === tab)
      );
      renderPolls();
    }

    function gotoPoll(id) { window.location.href = `poll.html?id=${id}`; }

    async function deletePoll(e, id) {
      e.stopPropagation();
      if (!confirm('Delete this poll? This cannot be undone.')) return;
      const { error } = await sb.from('polls').delete().eq('id', id).eq('user_id', user.id);
      if (error) { showToast('Failed to delete poll.'); return; }
      allPolls = allPolls.filter(p => p.id !== id);
      updateStats(); renderPolls(); showToast('Poll deleted.');
    }

    function openModal()  { document.getElementById('modal').classList.add('open'); document.getElementById('m-question').focus(); }
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('m-question').value = '';
      document.getElementById('m-desc').value = '';
      document.getElementById('modal-banner').className = 'banner';
      resetOptions();
    }
    function handleBackdropClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
    function resetOptions() {
      document.getElementById('options-list').innerHTML = `
        <div class="option-row"><input type="text" placeholder="Option 1" /><button class="btn-remove-opt" onclick="removeOption(this)">✕</button></div>
        <div class="option-row"><input type="text" placeholder="Option 2" /><button class="btn-remove-opt" onclick="removeOption(this)">✕</button></div>`;
    }
    function addOption() {
      const list = document.getElementById('options-list');
      const row  = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `<input type="text" placeholder="Option ${list.children.length + 1}" /><button class="btn-remove-opt" onclick="removeOption(this)">✕</button>`;
      list.appendChild(row); row.querySelector('input').focus();
    }
    function removeOption(btn) {
      const list = document.getElementById('options-list');
      if (list.children.length <= 2) { showModalBanner('A poll needs at least 2 options.'); return; }
      btn.closest('.option-row').remove();
    }
    async function createPoll() {
      const question = document.getElementById('m-question').value.trim();
      const desc     = document.getElementById('m-desc').value.trim();
      const options  = [...document.querySelectorAll('#options-list input')].map(i => i.value.trim()).filter(Boolean);
      document.getElementById('modal-banner').className = 'banner';
      if (!question)          { showModalBanner('Question is required.'); return; }
      if (options.length < 2) { showModalBanner('Add at least 2 options.'); return; }
      const btn = document.getElementById('btn-create');
      btn.disabled = true; btn.classList.add('loading');
      try {
        const { error } = await sb.rpc('create_poll', { p_user_id:user.id, p_question:question, p_description:desc||null, p_options:options, p_is_public:true });
        if (error) throw error;
        closeModal(); showToast('Poll created!'); await loadAll();
      } catch(e) { showModalBanner(e.message || 'Failed to create poll.'); }
      finally { btn.disabled = false; btn.classList.remove('loading'); }
    }

    function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showPageBanner(msg)  { const b = document.getElementById('page-banner');  b.textContent = msg; b.className = 'banner error'; }
    function showModalBanner(msg) { const b = document.getElementById('modal-banner'); b.textContent = msg; b.className = 'banner error'; }
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
    function logout() { sessionStorage.removeItem('pw_user'); window.location.href = 'login.html'; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    loadAll();
  </script>
</body>
</html>
