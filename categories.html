<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTCGamble — Categories</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0e0e11;--surface:#16161a;--card:#1c1c22;--card2:#222228;
      --border:#2a2a35;--border2:#3a3a48;--accent:#6c63ff;--accent-h:#5a52e8;
      --text:#f0f0f5;--muted:#8888a0;--dim:#55556a;--err:#ff6b6b;--success:#4ecb7a;--gold:#ffa94d;
    }
    html, body { max-width:100%;overflow-x:hidden; }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh; }
    body::before { content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0; }

    nav { position:sticky;top:0;z-index:100;background:rgba(14,14,17,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 48px;height:60px; }
    .nav-logo { display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0; }
    .nav-logo-icon { width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .nav-logo-icon svg { width:16px;height:16px;fill:#fff; }
    .nav-logo-text { font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;white-space:nowrap; }
    .nav-right { display:flex;align-items:center;gap:12px;flex-shrink:1;min-width:0; }
    .nav-user { font-size:13px;color:var(--muted);white-space:nowrap; }
    .nav-user span { color:var(--text);font-weight:500; }
    .nav-points { display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;border-radius:20px;padding:4px 12px;transition:all 0.2s;white-space:nowrap;flex-shrink:0; }
    .btn-sm { height:34px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);transition:background 0.15s;white-space:nowrap;flex-shrink:0; }
    .btn-sm:hover { background:var(--card2); }
    .btn-accent { background:var(--accent);border-color:var(--accent);color:#fff; }
    .btn-accent:hover { background:var(--accent-h);border-color:var(--accent-h); }

    main { position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 48px 80px; }
    .page-header { display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap; }
    .page-header h1 { font-size:24px;font-weight:700;letter-spacing:-0.4px; }
    .page-header p { font-size:14px;color:var(--muted);margin-top:3px; }

    .banner { padding:10px 13px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none; }
    .banner.error   { display:block;background:rgba(255,107,107,0.10);border:1px solid rgba(255,107,107,0.25);color:var(--err); }
    .banner.success { display:block;background:rgba(78,203,122,0.10);border:1px solid rgba(78,203,122,0.25);color:var(--success); }

    .tabs { display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px; }
    .tab { padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color 0.15s;white-space:nowrap; }
    .tab.active { color:var(--text);border-bottom-color:var(--accent); }

    .cat-grid { display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:14px; }
    .cat-card { position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:border-color 0.15s,background 0.15s; }
    .cat-card:hover { border-color:var(--border2);background:var(--card2); }
    .cat-card.is-ended { opacity:0.7; }
    .cat-icon { width:38px;height:38px;background:rgba(108,99,255,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px; }
    .cat-icon svg { width:19px;height:19px;fill:var(--accent); }
    .cat-top-row { display:flex;align-items:flex-start;justify-content:space-between;gap:8px; }
    .cat-badge { padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px;flex-shrink:0; }
    .cat-badge-ongoing { background:rgba(78,203,122,0.12);color:var(--success); }
    .cat-badge-ended   { background:rgba(136,136,160,0.12);color:var(--muted); }
    .cat-name { font-size:16px;font-weight:700;letter-spacing:-0.2px;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .cat-points { font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:2px; }
    .cat-points-label { font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:14px; }
    .cat-meta { font-size:12px;color:var(--muted);display:flex;gap:10px;border-top:1px solid var(--border);padding-top:12px;margin-bottom:10px; }
    .cat-toggle { width:100%;height:32px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:background 0.15s; }
    .cat-toggle:hover { background:var(--card2);color:var(--text); }

    .empty { text-align:center;padding:60px 20px;color:var(--muted); }
    .empty svg { width:48px;height:48px;opacity:0.2;margin-bottom:14px; }
    .empty h3 { font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px; }
    .empty p { font-size:14px; }

    .skeleton { background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px; }
    .skel-box { background:var(--border);border-radius:8px;animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .skel-grid { display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:14px; }

    .modal-backdrop { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:24px; }
    .modal-backdrop.open { display:flex; }
    .modal { background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:420px; }
    .modal h2 { font-size:18px;font-weight:700;margin-bottom:20px; }
    .form-group { margin-bottom:16px; }
    label { display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:7px; }
    input[type="text"] { width:100%;height:42px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:0 13px;outline:none;font-family:inherit;transition:border-color 0.15s; }
    input:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15); }
    input::placeholder { color:var(--dim); }
    .modal-footer { display:flex;gap:10px;margin-top:22px; }
    .btn-full { flex:1;height:44px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:background 0.15s; }
    .btn-full:hover { background:var(--card2); }
    .btn-full.primary { background:var(--accent);border-color:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px; }
    .btn-full.primary:hover { background:var(--accent-h); }
    .btn-full.primary:disabled { opacity:0.55;cursor:not-allowed; }
    .spinner { width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:none; }
    .btn-full.primary.loading .spinner { display:block; }
    .btn-full.primary.loading .lbl { display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);z-index:999;transition:transform 0.25s ease;white-space:nowrap;max-width:calc(100vw - 32px);overflow:hidden;text-overflow:ellipsis; }
    .toast.show { transform:translateX(-50%) translateY(0); }

    .lbl-short { display:none; }

    @media(max-width:700px) {
      nav { padding:0 14px;gap:6px; }
      main { padding:24px 14px 60px; }
      .nav-user { display:none; }
      .nav-right { gap:6px; }
      .nav-points { padding:4px 8px;font-size:12px; }
      .btn-sm { padding:0 10px;font-size:12px; }
      .lbl-full { display:none; }
      .lbl-short { display:inline; }
    }
    @media(max-width:380px) {
      nav { padding:0 10px; }
      main { padding:20px 10px 60px; }
      .nav-logo-text { display:none; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="categories.html">
      <div class="nav-logo-icon"><svg viewBox="0 0 24 24"><path d="M3 17h4v-6H3v6zm0-8h4V7H3v2zm6 8h4v-4H9v4zm0-8h4V7H9v2zm6 8h4V9h-4v8zm0-10h4V7h-4v2z"/></svg></div>
      <span class="nav-logo-text">PTCGamble</span>
    </a>
    <div class="nav-right">
      <span class="nav-user">Signed in as <span id="nav-username">—</span></span>
      <div class="nav-points" id="nav-points-badge">⭐ <span id="nav-points">0</span> pts</div>
      <button class="btn-sm btn-accent" onclick="openModal()"><span class="lbl-full">+ New category</span><span class="lbl-short">+ Category</span></button>
      <button class="btn-sm" onclick="logout()"><span class="lbl-full">Sign out</span><span class="lbl-short">Exit</span></button>
    </div>
  </nav>

  <main>
    <div class="page-header"><div><h1>Categories</h1><p>Pick a category to see its polls, or create a new one.</p></div></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('ongoing')" id="tab-ongoing">Ongoing</button>
      <button class="tab"        onclick="switchTab('ended')"   id="tab-ended">Ended</button>
    </div>

    <div class="banner" id="page-banner"></div>

    <div id="cat-container">
      <div class="skel-grid">
        <div class="skeleton"><div class="skel-box" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div><div class="skel-box" style="height:16px;width:60%;margin-bottom:10px"></div><div class="skel-box" style="height:22px;width:40%;margin-bottom:14px"></div><div class="skel-box" style="height:12px;width:70%"></div></div>
        <div class="skeleton"><div class="skel-box" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div><div class="skel-box" style="height:16px;width:70%;margin-bottom:10px"></div><div class="skel-box" style="height:22px;width:35%;margin-bottom:14px"></div><div class="skel-box" style="height:12px;width:60%"></div></div>
        <div class="skeleton"><div class="skel-box" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div><div class="skel-box" style="height:16px;width:50%;margin-bottom:10px"></div><div class="skel-box" style="height:22px;width:45%;margin-bottom:14px"></div><div class="skel-box" style="height:12px;width:65%"></div></div>
      </div>
    </div>
  </main>

  <div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
    <div class="modal">
      <h2>Create a category</h2>
      <div class="banner" id="modal-banner"></div>
      <div class="form-group"><label for="m-name">Name</label><input type="text" id="m-name" placeholder="e.g. World Cup 2026" maxlength="80" /></div>
      <div class="modal-footer">
        <button class="btn-full" onclick="closeModal()">Cancel</button>
        <button class="btn-full primary" id="btn-create" onclick="createCategory()"><div class="spinner"></div><span class="lbl">Create category</span></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL  = 'https://empvogfvzuutfizzsocx.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtcHZvZ2Z2enV1dGZpenpzb2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzEwMzcsImV4cCI6MjA5ODEwNzAzN30.BP3aWRPxURQqYYmvWrtzTNXElUvxkcPmG5BlMgmgAno';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function getSession() {
      return localStorage.getItem('pw_user') || sessionStorage.getItem('pw_user');
    }
    const session = getSession();
    if (!session) { window.location.href = 'index.html'; }
    const user = JSON.parse(session);
    document.getElementById('nav-username').textContent = user.username;

    function ptsColor(n) { return n > 0 ? 'var(--gold)' : n < 0 ? 'var(--err)' : 'var(--muted)'; }
    function ptsIcon(n)  { return n < 0 ? '📉' : '⭐'; }

    function updateNavPoints(total) {
      const badge = document.getElementById('nav-points-badge');
      badge.innerHTML = `${ptsIcon(total)} <span id="nav-points">${total}</span> pts`;
      badge.style.color = ptsColor(total);
      badge.style.background = total < 0 ? 'rgba(255,107,107,0.08)' : 'rgba(255,169,77,0.10)';
      badge.style.border = `1px solid ${total < 0 ? 'rgba(255,107,107,0.25)' : 'rgba(255,169,77,0.2)'}`;
    }

    let currentTab  = 'ongoing';
    let allCats     = [];
    let pointsMap   = {};
    let countMap    = {};

    async function loadCategories() {
      try {
        const [{ data: cats, error: catErr }, { data: polls, error: pollErr }, { data: pointsRows, error: ptsErr }] = await Promise.all([
          sb.from('poll_category').select('id,name,created_at,status,user_id').order('created_at', { ascending: true }),
          sb.from('polls').select('id,category_id,ends_at'),
          sb.rpc('get_user_points_by_category', { p_user_id: user.id }),
        ]);
        if (catErr)  throw catErr;
        if (pollErr) throw pollErr;
        if (ptsErr)  throw ptsErr;

        allCats = cats || [];

        pointsMap = {};
        (pointsRows || []).forEach(r => { pointsMap[r.category_id] = Number(r.points); });

        countMap = {};
        (polls || []).forEach(p => {
          const c = countMap[p.category_id] || (countMap[p.category_id] = { total: 0, open: 0 });
          c.total++;
          const closed = !!(p.ends_at && new Date(p.ends_at) < new Date());
          if (!closed) c.open++;
        });

        renderCategories();

        const totalPoints = Object.values(pointsMap).reduce((a, b) => a + b, 0);
        updateNavPoints(totalPoints);
      } catch (e) {
        document.getElementById('cat-container').innerHTML =
          `<div class="empty"><h3>Failed to load categories</h3><p>${e.message}</p></div>`;
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      ['ongoing', 'ended'].forEach(t =>
        document.getElementById('tab-' + t).classList.toggle('active', t === tab)
      );
      renderCategories();
    }

    function renderCategories() {
      const container = document.getElementById('cat-container');
      const cats = allCats.filter(c => (c.status || 'ongoing') === currentTab);

      if (!cats.length) {
        const msgs = {
          ongoing: ['No ongoing categories', 'Create your first category using the button above.'],
          ended:   ['No ended categories',   'Categories marked as ended will show up here.'],
        };
        const [title, sub] = msgs[currentTab];
        container.innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M8 8h5M8 16h3"/></svg>
          <h3>${title}</h3><p>${sub}</p></div>`;
        return;
      }

      container.innerHTML = `<div class="cat-grid">${cats.map(c => {
        const pts = pointsMap[c.id] ?? 0;
        const counts = countMap[c.id] || { total: 0, open: 0 };
        const isEnded = c.status === 'ended';
        const isOwner = c.user_id === user.id;

        return `<div class="cat-card ${isEnded ? 'is-ended' : ''}" onclick="gotoCategory(${c.id})">
          <div class="cat-top-row">
            <div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M3 17h4v-6H3v6zm0-8h4V7H3v2zm6 8h4v-4H9v4zm0-8h4V7H9v2zm6 8h4V9h-4v8zm0-10h4V7h-4v2z"/></svg></div>
            <span class="cat-badge ${isEnded ? 'cat-badge-ended' : 'cat-badge-ongoing'}">${isEnded ? 'Ended' : 'Ongoing'}</span>
          </div>
          <div class="cat-name">${escHtml(c.name)}</div>
          <div class="cat-points" style="color:${ptsColor(pts)}">${ptsIcon(pts)} ${pts}</div>
          <div class="cat-points-label">Your points</div>
          <div class="cat-meta">
            <span>${counts.total} poll${counts.total !== 1 ? 's' : ''}</span>
            <span>${counts.open} open</span>
          </div>
          ${isOwner ? `<button class="cat-toggle" onclick="toggleCategoryStatus(event, ${c.id}, '${c.status}')">${isEnded ? 'Reopen as ongoing' : 'Mark as ended'}</button>` : ''}
        </div>`;
      }).join('')}</div>`;
    }

    function gotoCategory(id) { window.location.href = `dashboard.html?category=${id}`; }

    async function toggleCategoryStatus(e, id, currentStatus) {
      e.stopPropagation();
      const newStatus = currentStatus === 'ended' ? 'ongoing' : 'ended';
      const verb = newStatus === 'ended' ? 'mark this category as ended' : 'reopen this category as ongoing';
      if (!confirm(`Are you sure you want to ${verb}?`)) return;

      const { error } = await sb.from('poll_category').update({ status: newStatus }).eq('id', id).eq('user_id', user.id);
      if (error) { showToast('Failed to update category.'); return; }
      showToast(newStatus === 'ended' ? 'Category marked as ended.' : 'Category reopened.');
      await loadCategories();
    }

    function openModal()  { document.getElementById('modal').classList.add('open'); document.getElementById('m-name').focus(); }
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('m-name').value = '';
      document.getElementById('modal-banner').className = 'banner';
    }
    function handleBackdropClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

    async function createCategory() {
      const name = document.getElementById('m-name').value.trim();
      document.getElementById('modal-banner').className = 'banner';
      if (!name) { showModalBanner('Category name is required.'); return; }

      const btn = document.getElementById('btn-create');
      btn.disabled = true; btn.classList.add('loading');
      try {
        const { error } = await sb.rpc('create_category', { p_user_id: user.id, p_name: name });
        if (error) throw error;
        closeModal(); showToast('Category created!'); await loadCategories();
      } catch (e) { showModalBanner(e.message || 'Failed to create category.'); }
      finally { btn.disabled = false; btn.classList.remove('loading'); }
    }

    function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showModalBanner(msg) { const b = document.getElementById('modal-banner'); b.textContent = msg; b.className = 'banner error'; }
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
    function logout() {
      localStorage.removeItem('pw_user');
      sessionStorage.removeItem('pw_user');
      window.location.href = 'index.html';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    loadCategories();
  </script>
</body>
</html>
